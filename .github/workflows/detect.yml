name: Anomaly Detection Pipeline

on:
  # Run automatically every 15 minutes
  #schedule:
  #  - cron: '*/15 * * * *'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pandas scikit-learn requests

      - name: Generate logs across multiple time windows
        run: |
          mkdir -p logs
          python3 app.py &
          APP_PID=$!
          sleep 3
          # /simulate/bulk generates logs spread across 10 fake time windows
          # 8 normal windows + 2 anomalous windows — gives detector enough data
          curl -s "http://localhost:5000/simulate/bulk" > /dev/null
          sleep 2
          kill $APP_PID || true

      - name: Run anomaly detector
        run: |
          python3 detector.py

      - name: Run AI summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 summarizer.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detection-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
